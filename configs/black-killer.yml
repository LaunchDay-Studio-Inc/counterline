# Black Killer Specialist Configuration
# Profile: Caro-Kann Classical 4...Bf5 vs SF18

profile: black_killer
version: "0.2.0"

opening:
  name: "Caro-Kann Classical 4...Bf5 (B09)"
  seed_pgn: "1. e4 c6 2. d4 d5 3. Nc3 dxe4 4. Nxe4 Bf5 5. Ng3 Bg6 6. h4 h6 7. Nf3 Nd7 8. h5 Bh7 9. Bd3 Bxd3 10. Qxd3 e6"
  exit_epd: "r2qkbnr/pp1n1pp1/2p1p2p/7P/3P4/3Q1NN1/PPP2PP1/R1B1K2R w KQkq -"
  exit_fen: "r2qkbnr/pp1n1pp1/2p1p2p/7P/3P4/3Q1NN1/PPP2PP1/R1B1K2R w KQkq - 0 11"

engine:
  base_path: "bin/stockfish-master"
  target_path: "bin/stockfish-sf18"
  threads: 1
  hash_mb: 64

wrapper:
  use_learned_book: true
  book_depth_limit: 40
  empirical_weight: 0.6
  wdl_weight: 0.25
  decisive_bonus: 0.15
  max_candidates: 5
  reply_bundle_size: 3
  # Black-specific: be more aggressive about using book moves
  # since Black needs to actively outplay, not just hold
  fallback_aggressiveness: 0.8

book:
  path: "data/black_killer/book/carokann.json"
  db_path: "data/black_killer/db/empirical.sqlite"

mining:
  nodes_analysis: 80000
  nodes_playout: 30000
  playout_depth: 8
  max_depth: 16
  min_score_extend: 45.0
  # More willing to extend marginal branches for Black
  decisive_bonus: 0.15

# Black-specific tuning knobs
tuning:
  # Candidate count: wider than White (5 vs 4) since Black
  # needs more options to find counterplay
  candidate_count: 5
  # Reply bundle: consider 3 White replies (vs 2 for White)
  # since SF18 has more initiative as White
  reply_bundle_size: 3
  # Verification: deeper analysis to avoid over-fitting
  verification_nodes: 80000
  # Empirical weight: slightly lower than White since
  # Black's empirical results are noisier
  empirical_weight: 0.6
  # Decisiveness bonus: higher than White (0.15 vs 0.1)
  # because Black needs wins, not draws
  decisiveness_bonus: 0.15
  # Fallback: how aggressively to use book even when
  # master slightly disagrees
  fallback_aggressiveness: 0.8
  # Trust book depth: deeper tree before delegating
  book_trust_depth: 40
  # Tree depth: how deep to mine before stopping
  tree_depth: 16
