name: Android Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: apps/android

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate content assets
        run: python3 scripts/extract_content.py

      - name: Decode keystore
        if: env.COUNTERLINE_KEYSTORE_BASE64 != ''
        env:
          COUNTERLINE_KEYSTORE_BASE64: ${{ secrets.COUNTERLINE_KEYSTORE_BASE64 }}
        run: |
          echo "$COUNTERLINE_KEYSTORE_BASE64" | base64 -d > /tmp/counterline-release.jks
          echo "COUNTERLINE_KEYSTORE_FILE=/tmp/counterline-release.jks" >> $GITHUB_ENV

      - name: Build release APK
        env:
          COUNTERLINE_KEYSTORE_FILE: ${{ env.COUNTERLINE_KEYSTORE_FILE }}
          COUNTERLINE_KEYSTORE_PASSWORD: ${{ secrets.COUNTERLINE_KEYSTORE_PASSWORD }}
          COUNTERLINE_KEY_ALIAS: ${{ secrets.COUNTERLINE_KEY_ALIAS }}
          COUNTERLINE_KEY_PASSWORD: ${{ secrets.COUNTERLINE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build release AAB
        env:
          COUNTERLINE_KEYSTORE_FILE: ${{ env.COUNTERLINE_KEYSTORE_FILE }}
          COUNTERLINE_KEYSTORE_PASSWORD: ${{ secrets.COUNTERLINE_KEYSTORE_PASSWORD }}
          COUNTERLINE_KEY_ALIAS: ${{ secrets.COUNTERLINE_KEY_ALIAS }}
          COUNTERLINE_KEY_PASSWORD: ${{ secrets.COUNTERLINE_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon

      - name: Generate checksums
        run: |
          cd app/build/outputs
          find . -name '*.apk' -o -name '*.aab' | while read f; do
            sha256sum "$f" > "$f.sha256"
          done
          echo "=== Release artifact checksums ==="
          cat $(find . -name '*.sha256')

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: counterline-release-apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: counterline-release-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload store metadata
        uses: actions/upload-artifact@v4
        with:
          name: counterline-store-metadata
          path: apps/android/store/
          retention-days: 90

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: counterline-checksums
          path: |
            apps/android/app/build/outputs/**/*.sha256
          retention-days: 90

      - name: Create GitHub Release
        if: env.COUNTERLINE_KEYSTORE_FILE != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/android/app/build/outputs/apk/release/*.apk
            apps/android/app/build/outputs/bundle/release/*.aab
          body: |
            ## CounterLine ${{ github.ref_name }}

            ### Artifacts
            - **APK** — Direct install on Android devices (sideload)
            - **AAB** — Upload to Google Play Console

            ### What's included
            - Vienna Gambit Accepted (White, C29)
            - Caro-Kann Classical 4…Bf5 (Black, B18)
            - Spaced-repetition drills
            - Annotated model games
            - Plans & deviation handling
            - On-device Stockfish engine analysis

            ### Approved headline
            CounterLine: An Engine-Tested Opening Repertoire

            ### Disclaimers
            - CounterLine is derived from Stockfish and distributed under GPL-3.0
            - Results are specific to the published fixed suite and tested conditions
          draft: false
          prerelease: false

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/counterline-release.jks
