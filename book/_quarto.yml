project:
  type: book
  output-dir: dist

book:
  title: "CounterLine: An Engine-Tested Opening Repertoire"
  subtitle: "Two precise opening lines — validated against Stockfish 18 on a published fixed suite"
  author: "The CounterLine Project"
  date: "2026-03-30"
  chapters:
    - index.qmd
    - 01-what-counterline-is.qmd
    - 02-the-two-weapons.qmd
    - 03-white-repertoire.qmd
    - 04-black-repertoire.qmd
    - 05-model-games.qmd
    - 06-key-plans-and-patterns.qmd
    - 07-common-deviations.qmd
    - 08-drill-system.qmd
    - 09-quick-start.qmd
    - 10-proof-boundaries.qmd
  appendices:
    - appendix-a-lines.qmd
    - appendix-b-results.qmd
    - appendix-c-how-to-use-the-app.qmd
  references: references.bib

format:
  pdf:
    documentclass: book
    pdf-engine: tectonic
    toc: true
    toc-depth: 3
    number-sections: true
    colorlinks: true
    linkcolor: "NavyBlue"
    urlcolor: "NavyBlue"
    geometry:
      - top=25mm
      - bottom=25mm
      - left=30mm
      - right=25mm
    fontsize: 11pt
    include-in-header:
      text: |
        \usepackage{awesomebox}
        \usepackage{longtable}
        \usepackage{booktabs}
    output-file: "CounterLine"

  epub:
    toc: true
    toc-depth: 3
    number-sections: true
    output-file: "CounterLine"
