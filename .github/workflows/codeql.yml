name: "CodeQL"

on:
  push:
    branches: ["master", "main", "exp/**"]
  pull_request:
    branches: ["master", "main"]
  schedule:
    - cron: "17 18 * * 1"

jobs:
  analyze-cpp:
    name: Analyze C++ (Stockfish Engine)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Build
        working-directory: src
        run: make -j build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  analyze-kotlin:
    name: Analyze Kotlin (Android App)
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || contains(github.ref, 'main') || contains(github.ref, 'exp/')
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Generate content assets
        working-directory: apps/android
        run: python3 scripts/extract_content.py

      - name: Build Android app
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
